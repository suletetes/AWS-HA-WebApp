name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-compile:
    name: TypeScript Compilation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-compile
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - run: npm run test:unit -- --forceExit --coverage
        env:
          ASG_NAME: test-asg

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: app/coverage/

  property-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    needs: lint-and-compile
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - run: npm run test:property -- --forceExit
        env:
          ASG_NAME: test-asg

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-compile
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - run: npm run test:integration -- --forceExit
        env:
          ASG_NAME: test-asg

  bash-syntax:
    name: Shell Script Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax for all infrastructure scripts
        run: |
          failed=0
          for script in $(find infra -name '*.sh' -type f); do
            if bash -n "$script"; then
              echo "OK: $script"
            else
              echo "FAIL: $script"
              failed=1
            fi
          done
          exit $failed

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [unit-tests, property-tests, integration-tests, bash-syntax]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: mkdir -p dist/views && cp src/views/dashboard.ejs dist/views/

      - uses: actions/upload-artifact@v4
        with:
          name: cloudpulse-build
          path: |
            app/dist/
            app/package.json
            app/package-lock.json
